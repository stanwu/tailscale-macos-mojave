name: Build Tailscale for macOS Mojave

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

env:
  VERSION: v1.76.3
  GO_VERSION: '1.23'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Clone Tailscale source
        run: git clone --depth 1 --branch ${{ env.VERSION }} https://github.com/tailscale/tailscale.git src/tailscale

      - name: Generate overlay.json
        run: |
          GOROOT_SRC="$(go env GOROOT)/src"
          OVERLAY_DIR="${GITHUB_WORKSPACE}/overlay"
          cat > overlay.json <<EOF
          {
            "Replace": {
              "${GOROOT_SRC}/crypto/x509/internal/macos/security.go": "${OVERLAY_DIR}/crypto/x509/internal/macos/security.go",
              "${GOROOT_SRC}/crypto/x509/internal/macos/security.s": "${OVERLAY_DIR}/crypto/x509/internal/macos/security.s",
              "${GOROOT_SRC}/crypto/x509/root_darwin.go": "${OVERLAY_DIR}/crypto/x509/root_darwin.go"
            }
          }
          EOF
          cat overlay.json

      - name: Build tailscaled
        working-directory: src/tailscale
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 MACOSX_DEPLOYMENT_TARGET=10.14 \
          go build \
            -overlay "${GITHUB_WORKSPACE}/overlay.json" \
            -tags osusergo,netgo \
            -ldflags "-s -w -X tailscale.com/version.longStamp=${{ env.VERSION }} -X tailscale.com/version.shortStamp=${{ env.VERSION }}" \
            -o "${GITHUB_WORKSPACE}/tailscaled" \
            ./cmd/tailscaled

      - name: Build tailscale
        working-directory: src/tailscale
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 MACOSX_DEPLOYMENT_TARGET=10.14 \
          go build \
            -overlay "${GITHUB_WORKSPACE}/overlay.json" \
            -tags osusergo,netgo \
            -ldflags "-s -w -X tailscale.com/version.longStamp=${{ env.VERSION }} -X tailscale.com/version.shortStamp=${{ env.VERSION }}" \
            -o "${GITHUB_WORKSPACE}/tailscale" \
            ./cmd/tailscale

      - name: Verify Mach-O header and symbols
        run: |
          python3 <<'PYEOF'
          import json, struct, subprocess, sys

          with open("mach-o-header-symbols.json") as f:
              spec = json.load(f)

          errors = []

          for name in ["tailscale", "tailscaled"]:
              print(f"\n=== Verifying {name} ===")

              # --- Header check ---
              with open(name, "rb") as f:
                  h = f.read(32)

              magic = h[0:4].hex()
              cputype = int.from_bytes(h[4:8], "little")
              cpusubtype = int.from_bytes(h[8:12], "little")
              filetype = int.from_bytes(h[12:16], "little")
              flags = int.from_bytes(h[24:28], "little")

              ref = spec["reference_build"][name]

              checks = [
                  ("magic",      magic,      ref["magic"]),
                  ("cputype",    cputype,    ref["cputype"]),
                  ("cpusubtype", cpusubtype, ref["cpusubtype"]),
                  ("filetype",   filetype,   ref["filetype"]),
              ]
              for field, got, want in checks:
                  if got == want:
                      print(f"  [OK] {field}: {got}")
                  else:
                      msg = f"  [FAIL] {field}: got {got}, want {want}"
                      print(msg)
                      errors.append(f"{name}: {msg.strip()}")

              # Check flags contain required bits
              want_flags = ref["flags"]
              if (flags & want_flags) == want_flags:
                  print(f"  [OK] flags: {flags:#x} (contains {want_flags:#x})")
              else:
                  msg = f"  [FAIL] flags: {flags:#x} missing bits from {want_flags:#x}"
                  print(msg)
                  errors.append(f"{name}: {msg.strip()}")

              # --- Symbol check ---
              out = subprocess.check_output(["strings", name], text=True)
              symbols = set(out.splitlines())

              for sym in spec["symbols"]["required"]:
                  if sym in symbols:
                      print(f"  [OK] required symbol present: {sym}")
                  else:
                      msg = f"  [FAIL] required symbol missing: {sym}"
                      print(msg)
                      errors.append(f"{name}: {msg.strip()}")

              for sym in spec["symbols"]["forbidden"]:
                  if sym not in symbols:
                      print(f"  [OK] forbidden symbol absent: {sym}")
                  else:
                      msg = f"  [FAIL] forbidden symbol found: {sym} (would crash on Mojave)"
                      print(msg)
                      errors.append(f"{name}: {msg.strip()}")

          print(f"\n=== Summary ===")
          if errors:
              print(f"FAILED with {len(errors)} error(s):")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          else:
              print("All checks passed — binaries are Mojave-compatible")
          PYEOF

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          zip tailscale-${{ env.VERSION }}-macos-mojave-amd64.zip \
            tailscale \
            tailscaled \
            run_tailscale.sh \
            overlay.json

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tailscale-${{ env.VERSION }}-macos-mojave-amd64.zip
          body: |
            ## Tailscale ${{ env.VERSION }} for macOS 10.14 Mojave (darwin/amd64)

            Cross-compiled static binaries with Go stdlib `-overlay` patch to replace `SecTrustCopyCertificateChain` (macOS 12+) with Mojave-compatible APIs.

            ### Contents
            - `tailscale` — CLI client (13MB)
            - `tailscaled` — daemon (22MB)
            - `run_tailscale.sh` — startup helper script
            - `overlay.json` — Go overlay config (for reference)

            ### Quick start
            ```bash
            unzip tailscale-${{ env.VERSION }}-macos-mojave-amd64.zip
            sudo ./run_tailscale.sh
            ```

            ### Note
            After starting, set up the CLI alias:
            ```bash
            alias tailscale="./tailscale --socket=/var/run/tailscaled.sock"
            ```
