name: Build Tailscale for macOS Mojave

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

env:
  VERSION: v1.76.3
  GO_VERSION: '1.23'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Clone Tailscale source
        run: git clone --depth 1 --branch ${{ env.VERSION }} https://github.com/tailscale/tailscale.git src/tailscale

      - name: Generate overlay.json
        run: |
          GOROOT_SRC="$(go env GOROOT)/src"
          OVERLAY_DIR="${GITHUB_WORKSPACE}/overlay"
          cat > overlay.json <<EOF
          {
            "Replace": {
              "${GOROOT_SRC}/crypto/x509/internal/macos/security.go": "${OVERLAY_DIR}/crypto/x509/internal/macos/security.go",
              "${GOROOT_SRC}/crypto/x509/internal/macos/security.s": "${OVERLAY_DIR}/crypto/x509/internal/macos/security.s",
              "${GOROOT_SRC}/crypto/x509/root_darwin.go": "${OVERLAY_DIR}/crypto/x509/root_darwin.go"
            }
          }
          EOF
          cat overlay.json

      - name: Build tailscaled
        working-directory: src/tailscale
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 MACOSX_DEPLOYMENT_TARGET=10.14 \
          go build \
            -overlay "${GITHUB_WORKSPACE}/overlay.json" \
            -tags osusergo,netgo \
            -ldflags "-s -w -X tailscale.com/version.longStamp=${{ env.VERSION }} -X tailscale.com/version.shortStamp=${{ env.VERSION }}" \
            -o "${GITHUB_WORKSPACE}/tailscaled" \
            ./cmd/tailscaled

      - name: Build tailscale
        working-directory: src/tailscale
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 MACOSX_DEPLOYMENT_TARGET=10.14 \
          go build \
            -overlay "${GITHUB_WORKSPACE}/overlay.json" \
            -tags osusergo,netgo \
            -ldflags "-s -w -X tailscale.com/version.longStamp=${{ env.VERSION }} -X tailscale.com/version.shortStamp=${{ env.VERSION }}" \
            -o "${GITHUB_WORKSPACE}/tailscale" \
            ./cmd/tailscale

      - name: Verify Mach-O header and symbols
        run: python3 scripts/verify_macho.py mach-o-header-symbols.json tailscale tailscaled

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          zip tailscale-${{ env.VERSION }}-macos-mojave-amd64.zip \
            tailscale \
            tailscaled \
            run_tailscale.sh \
            overlay.json

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tailscale-${{ env.VERSION }}-macos-mojave-amd64.zip
          body: |
            ## Tailscale ${{ env.VERSION }} for macOS 10.14 Mojave (darwin/amd64)

            Cross-compiled static binaries with Go stdlib `-overlay` patch to replace `SecTrustCopyCertificateChain` (macOS 12+) with Mojave-compatible APIs.

            ### Contents
            - `tailscale` — CLI client (13MB)
            - `tailscaled` — daemon (22MB)
            - `run_tailscale.sh` — startup helper script
            - `overlay.json` — Go overlay config (for reference)

            ### Quick start
            ```bash
            unzip tailscale-${{ env.VERSION }}-macos-mojave-amd64.zip
            sudo ./run_tailscale.sh
            ```

            ### Note
            After starting, set up the CLI alias:
            ```bash
            alias tailscale="./tailscale --socket=/var/run/tailscaled.sock"
            ```
